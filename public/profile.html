<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile - RE:CAFÉ</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <script src="js/tailwind-config.js"></script>
    
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-sans antialiased text-text-main bg-background-light dark:bg-background-dark dark:text-slate-100;
                background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png");
            }
        }
        .profile-card {
            @apply bg-white/70 dark:bg-surface-dark/70 backdrop-blur-md border border-border-vintage rounded-2xl p-8 shadow-xl;
        }
        .info-label {
            @apply text-xs font-bold uppercase tracking-widest text-text-muted mb-1 block;
        }
        .info-value {
            @apply text-lg font-medium text-text-main dark:text-white border-b border-border-vintage/30 pb-2 mb-6 block w-full bg-transparent outline-none focus:border-primary transition-colors;
        }
    </style>
    <!-- Custom Script -->
    <script src="js/main.js" defer></script>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header Placeholder -->
    <div id="header-placeholder" class="min-h-[80px]"></div>

    <main class="flex-grow flex items-center justify-center py-20 px-4">
        <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Sidebar / Avatar -->
            <div class="md:col-span-1 space-y-6">
                <div class="profile-card flex flex-col items-center text-center">
                    <div class="relative group">
                        <div class="size-32 rounded-full overflow-hidden border-4 border-primary/20 mb-4 bg-secondary-light/20 flex items-center justify-center">
                            <span class="material-symbols-outlined text-6xl text-primary/40 leading-none">person</span>
                        </div>
                        <button class="absolute bottom-4 right-0 size-8 bg-primary text-white rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-sm">photo_camera</span>
                        </button>
                    </div>
                    <h2 class="text-2xl font-serif font-bold">Nguyễn Quốc An</h2>
                    <p class="text-sm text-text-muted mb-6">Thành viên thân thiết</p>
                    
                    <div class="w-full space-y-2 pt-4 border-t border-border-vintage/50">
                        <a href="#" class="flex items-center gap-3 p-3 rounded-lg bg-primary/5 text-primary font-bold transition-colors">
                            <span class="material-symbols-outlined">person</span>
                            <span>Thông tin cá nhân</span>
                        </a>
                        <a href="cart.html" class="flex items-center gap-3 p-3 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                            <span class="material-symbols-outlined">shopping_bag</span>
                            <span>Đơn hàng của tôi</span>
                        </a>
                        <a href="#" class="flex items-center gap-3 p-3 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                            <span class="material-symbols-outlined">favorite</span>
                            <span>Sản phẩm yêu thích</span>
                        </a>
                        <a href="#" class="flex items-center gap-3 p-3 rounded-lg hover:bg-red-50 text-red-600 transition-colors mt-4">
                            <span class="material-symbols-outlined">logout</span>
                            <span>Đăng xuất</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Main Content / Form -->
            <div class="md:col-span-2">
                <div class="profile-card">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-3xl font-serif font-bold">Thông tin tài khoản</h3>
                        <button class="px-6 py-2 bg-primary text-white text-sm font-bold rounded-full hover:bg-primary-dark transition-all transform hover:scale-105">
                            Cập nhật
                        </button>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8">
                        <div class="col-span-1">
                            <label class="info-label">Họ và Tên</label>
                            <input type="text" value="Nguyễn Quốc An" class="info-value" placeholder="Nhập họ và tên">
                        </div>
                        <div class="col-span-1">
                            <label class="info-label">Email</label>
                            <input type="email" value="an.nguyen@example.com" class="info-value" placeholder="Nhập email">
                        </div>
                        <div class="col-span-1">
                            <label class="info-label">Số điện thoại</label>
                            <input type="tel" value="0987 654 321" class="info-value" placeholder="Nhập số điện thoại">
                        </div>
                        <div class="col-span-1 text-right pt-6 flex flex-col justify-end">
                             <div class="inline-flex items-center gap-2 text-xs text-green-600 font-bold mb-8">
                                <span class="material-symbols-outlined text-sm">verified</span>
                                Đã xác thực
                             </div>
                        </div>
                        <div class="col-span-full">
                            <label class="info-label">Địa chỉ</label>
                            <textarea class="info-value h-24 resize-none" placeholder="Nhập địa chỉ của bạn">123 Đường Cà Phê, Quận Bình Thạnh, TP. Hồ Chí Minh</textarea>
                        </div>
                    </div>

                    <div class="mt-8 pt-8 border-t border-border-vintage/50">
                        <p class="text-sm text-text-muted italic">
                            * Thông tin của bạn được bảo mật tuyệt đối theo chính sách quyền riêng tư của RE:CAFÉ.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>
</body>
</html>
