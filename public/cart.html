<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>RE:CAFÉ - Giỏ hàng bền vững</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="js/tailwind-config.js"></script>
    
    <style type="text/tailwindcss">
        @layer base {
            body {
                background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png");
            }
        }
    </style>
    <script src="js/main.js" defer></script>
</head>
<body class="bg-background-light text-text-main font-sans min-h-screen flex flex-col">
    
    <!-- Header Placeholder -->
    <div id="header-placeholder" class="min-h-[80px]"></div>

    <main class="flex-grow w-full max-w-[1280px] mx-auto px-6 py-12">
        <h1 class="text-4xl md:text-5xl font-serif font-bold mb-12 text-primary tracking-tight">Giỏ hàng của bạn</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-16">
            <!-- Left: Cart Items -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Cart Item 1 -->
                <div class="flex gap-6 pb-8 border-b border-border-vintage/50">
                    <div class="size-32 md:size-40 bg-[#f3ede1] rounded-xl overflow-hidden flex-shrink-0 border border-[#e2d5c5]">
                        <img src="assets/images/espresso-vase.png" alt="Espresso Vase" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow flex flex-col justify-between py-1">
                        <div>
                            <div class="flex justify-between items-start">
                                <h3 class="text-xl font-bold text-primary uppercase tracking-tight">Espresso Vase</h3>
                                <button class="text-text-muted hover:text-red-500 transition-colors">
                                    <span class="material-symbols-outlined">close</span>
                                </button>
                            </div>
                            <p class="text-sm text-text-muted mt-1 italic">Màu sắc: Dark Roast</p>
                        </div>
                        <div class="flex justify-between items-end">
                            <div class="flex items-center border border-[#e2d5c5] rounded-lg bg-white/50 h-10 w-28">
                                <button class="w-8 h-full flex items-center justify-center hover:bg-white transition-colors">
                                    <span class="material-symbols-outlined !text-[16px]">remove</span>
                                </button>
                                <input class="w-full h-full text-center border-none bg-transparent focus:ring-0 font-bold text-sm p-0" readonly type="text" value="1"/>
                                <button class="w-8 h-full flex items-center justify-center hover:bg-white transition-colors">
                                    <span class="material-symbols-outlined !text-[16px]">add</span>
                                </button>
                            </div>
                            <span class="text-xl font-bold font-serif">$45.00</span>
                        </div>
                    </div>
                </div>

                <!-- Related/Upsell Section -->
                <div class="pt-12">
                    <h3 class="text-sm font-bold uppercase tracking-[0.2em] mb-8 text-text-muted">Có thể bạn sẽ thích</h3>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="group cursor-pointer">
                            <div class="aspect-square bg-white border border-[#e2d5c5] rounded-xl overflow-hidden mb-3 relative">
                                <img src="assets/images/coasters.png" class="w-full h-full object-cover group-hover:scale-105 transition-transform" alt="Java Coasters">
                                <button class="absolute bottom-3 right-3 bg-white p-2 rounded-full shadow-md opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span class="material-symbols-outlined text-primary">add</span>
                                </button>
                            </div>
                            <h4 class="font-bold text-xs uppercase tracking-wider">Bộ lót ly Java</h4>
                            <p class="text-text-muted text-[11px] font-bold">$24.00</p>
                        </div>
                        <div class="group cursor-pointer">
                            <div class="aspect-square bg-white border border-[#e2d5c5] rounded-xl overflow-hidden mb-3 relative">
                                <img src="assets/images/midnight-tray.png" class="w-full h-full object-cover group-hover:scale-105 transition-transform" alt="Midnight Tray">
                                <button class="absolute bottom-3 right-3 bg-white p-2 rounded-full shadow-md opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span class="material-symbols-outlined text-primary">add</span>
                                </button>
                            </div>
                            <h4 class="font-bold text-xs uppercase tracking-wider">Khay Midnight</h4>
                            <p class="text-text-muted text-[11px] font-bold">$38.00</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Order Summary -->
            <div class="lg:col-span-1">
                <div class="bg-white/40 border border-[#e2d5c5] p-8 rounded-2xl sticky top-24">
                    <h3 class="text-lg font-bold text-primary uppercase tracking-wider mb-6 pb-4 border-b border-border-vintage/30">Tóm tắt đơn hàng</h3>
                    
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-sm">
                            <span class="text-text-muted">Tạm tính</span>
                            <span class="font-bold font-serif">$45.00</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-text-muted">Phí vận chuyển</span>
                            <span class="font-bold font-serif">$5.00</span>
                        </div>
                        <div class="pt-4 border-t border-border-vintage/30 flex justify-between">
                            <span class="font-bold uppercase tracking-widest text-sm">Tổng cộng</span>
                            <span class="text-2xl font-bold font-serif text-primary">$50.00</span>
                        </div>
                    </div>

                    <button class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 uppercase tracking-[0.2em] text-xs mb-4">
                        Tiến hành thanh toán
                    </button>
                    
                    <div class="flex items-center justify-center gap-2 text-[10px] text-text-muted uppercase font-bold tracking-widest">
                        <span class="material-symbols-outlined !text-[14px]">lock</span>
                        Mã hóa SSL bảo mật
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

</body>
</html>
